[graph]
all-features = true

[advisories]
ignore = [
  { id = "RUSTSEC-2026-0194", reason = "Remaining quick-xml 0.38.x path is pinned by typst-library 0.15.0 through hayagriva/citationberg." },
  { id = "RUSTSEC-2026-0195", reason = "Remaining quick-xml 0.38.x path is pinned by typst-library 0.15.0 through hayagriva/citationberg." },
  { id = "RUSTSEC-2025-0141", reason = "Transitive through typst-library 0.15.0/syntect; no direct replacement at this layer." },
  { id = "RUSTSEC-2024-0436", reason = "Transitive through typst-library 0.15.0/hayagriva; no direct replacement at this layer." },
  { id = "RUSTSEC-2026-0192", reason = "Transitive through typst 0.15.0 font/SVG dependencies; no direct replacement at this layer." },
  { id = "RUSTSEC-2024-0320", reason = "Transitive through typst-library 0.15.0/syntect; no direct replacement at this layer." },
]

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",

  "Unicode-3.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "CDLA-Permissive-2.0",
  "CC0-1.0",
]
exceptions = [
  { crate = "option-ext", allow = ["MPL-2.0"] },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
