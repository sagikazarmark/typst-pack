# PROTOTYPE - corrected issue 80 target for the generated Dagger GraphQL contract.
#
# This desired module projection is corrected against the regenerated Rust
# fixture. It freezes names, kinds, references, list shapes, and nullability; it
# is still not evidence that implementation source or generated bindings exist.
# It is not Dang source or the complete Dagger core schema. Minimal File and
# Directory stubs preserve their actual OBJECT kind. The pinned engine exposes
# main-object functions directly on Query and constructor arguments on
# Query.with. File, Directory, CacheVolume, and custom-object inputs are IDs.
# Source arguments with defaults are nullable here and are resolved by the
# adapter contract. Dagger intentionally has no watch or session surface.

type File { id: ID! }
type Directory { id: ID! }

type Query {
  with(authorityCache: ID, authorityCacheQuotaBytes: String): Query!

  discoveryVariant(
    label: String
    target: TypstPackDiscoveryTarget
    sysInputs: [String!]
    features: [String!]
    documentTime: String
    overrides: ID
  ): TypstPackDiscoveryVariant!

  annotation(
    identifier: String!
    annotationEpoch: String!
    payload: ID!
  ): TypstPackPackAnnotation!

  reportDisclosure(
    diagnostics: Boolean
    evidence: Boolean
    sources: Boolean
    requestValues: Boolean
    overrideBytes: Boolean
    backingLocators: Boolean
    adapterDetail: Boolean
  ): TypstPackReportDisclosure!

  pdf(
    pages: String
    identifierMode: TypstPackPdfMetadataMode
    identifier: String
    creatorMode: TypstPackPdfMetadataMode
    creator: String
    creationTime: String
    standards: [TypstPackPdfStandard!]
    tagging: TypstPackPdfTagging
    pretty: Boolean
  ): TypstPackCompilationOutput!

  png(pages: String, ppi: String, bleed: Boolean): TypstPackCompilationOutput!
  svg(pages: String, bleed: Boolean, pretty: Boolean): TypstPackCompilationOutput!
  html(pretty: Boolean): TypstPackCompilationOutput!

  create(
    project: ID!
    input: String
    variants: [ID!]
    target: TypstPackDiscoveryTarget
    sysInputs: [String!]
    features: [String!]
    documentTime: String
    discoveryOverrides: ID
    include: [String!]
    packageDirectories: [ID!]
    fontDirectories: [ID!]
    packageEmbedding: TypstPackEmbeddingPolicy
    fontEmbedding: TypstPackEmbeddingPolicy
    embeddingPolicy: ID
    title: String
    description: String
    authors: [String!]
    keywords: [String!]
    annotations: [ID!]
    offline: Boolean
    certificate: ID
    trust: TypstPackTrustProfile
    limits: ID
    deadline: String
    # Null and zero remain distinct requested values even though both select
    # automatic width. Negative values are rejected during argument handling.
    # The adapter jobs record is outer operation data, never Creation Report state.
    jobs: Int
  ): TypstPackPackCreation!

  readArchive(
    archive: ID!
    expectedPackIdentity: String
    expectedArchiveContentIdentity: String
    expectedArchiveEncodingIdentity: String
    trust: TypstPackTrustProfile
    limits: ID
    deadline: String
  ): TypstPackPackIngress!

  readClosure(
    closure: ID!
    expectedPackIdentity: String
    trust: TypstPackTrustProfile
    limits: ID
    deadline: String
  ): TypstPackPackIngress!
}

type TypstPackDiscoveryVariant { id: ID! }
type TypstPackPackAnnotation { id: ID! }
type TypstPackReportDisclosure { id: ID! }
type TypstPackCompilationOutput { id: ID! }

type TypstPackPackCreation {
  id: ID!
  status: TypstPackCreationStatus!
  # Non-null exactly when status is ADMISSION_REFUSED; stage is non-null inside.
  admissionRefusal: TypstPackAdmissionRefusal
  # Complete corrected org.typst-pack.create-operation envelope, including every
  # public reached creation-resource category; it is not an alias
  # for Creation Report. It preserves adapter failure, Creation Request
  # Rejection, Creation Admission Refusal, and admitted Creation Report branches.
  report: File!
  pack: TypstPackPack
  requirePack: TypstPackPack!
}

type TypstPackPackIngress {
  id: ID!
  status: TypstPackPackIngressStatus!
  admissionRefusal: TypstPackAdmissionRefusal
  receipt: File!
  pack: TypstPackPack
  requirePack: TypstPackPack!
}

type TypstPackPack {
  id: ID!
  identity: String!
  inspect: File!

  archive(
    epoch: TypstPackPackFormatEpoch
    encoding: TypstPackArchiveEncoding
    trust: TypstPackTrustProfile
    limits: ID
    deadline: String
  ): TypstPackPackArchiveEncoding!

  closureExport(
    epoch: TypstPackPackFormatEpoch
    trust: TypstPackTrustProfile
    limits: ID
    deadline: String
  ): TypstPackClosureExport!

  materialize(
    trust: TypstPackTrustProfile
    limits: ID
    deadline: String
  ): TypstPackProjectMaterialization!

  compile(
    output: ID!
    overrides: ID
    sysInputs: [String!]
    features: [String!]
    documentTime: String
    packageDirectories: [ID!]
    fontDirectories: [ID!]
    offline: Boolean
    certificate: ID
    diagnosticPolicy: ID
    reportDisclosure: ID
    trust: TypstPackTrustProfile
    limits: ID
    deadline: String
    # Null and zero remain distinct requested values even though both select
    # automatic width. Negative values are rejected during argument handling.
    # The adapter jobs record is outer operation data, never Compilation Report state.
    jobs: Int
  ): TypstPackCompilation!
}

type TypstPackPackArchiveEncoding {
  id: ID!
  status: TypstPackRepresentationStatus!
  admissionRefusal: TypstPackAdmissionRefusal
  # Complete corrected org.typst-pack.representation-operation envelope. Its
  # nested Format Receipt retains refusal or reached outcome data.
  receipt: File!
  # Final only: NOT_APPLICABLE, SUCCEEDED, or FAILED; reducer intermediates are not wire values.
  stagingStatus: TypstPackStagingStatus!
  # Paired container-local staging receipt; it never rewrites the operation.
  stagingReceipt: File!
  publicationFormatReceipt: File
  publicationTransportReceipt: File
  archive: File
  requireArchive: File!
}

type TypstPackClosureExport {
  id: ID!
  status: TypstPackRepresentationStatus!
  admissionRefusal: TypstPackAdmissionRefusal
  # Complete corrected org.typst-pack.representation-operation envelope. Its
  # nested Format Receipt retains refusal or reached outcome data.
  receipt: File!
  # Final only: NOT_APPLICABLE, SUCCEEDED, or FAILED; reducer intermediates are not wire values.
  stagingStatus: TypstPackStagingStatus!
  # Paired container-local staging receipt; it never rewrites the operation.
  stagingReceipt: File!
  publicationFormatReceipt: File
  publicationTransportReceipt: File
  tree: Directory
  requireTree: Directory!
}

type TypstPackProjectMaterialization {
  id: ID!
  status: TypstPackRepresentationStatus!
  admissionRefusal: TypstPackAdmissionRefusal
  # Complete corrected org.typst-pack.project-materialization-operation
  # envelope. Its nested projection receipt retains refusal or reached data.
  receipt: File!
  # Final only: NOT_APPLICABLE, SUCCEEDED, or FAILED; reducer intermediates are not wire values.
  stagingStatus: TypstPackStagingStatus!
  # Paired container-local staging receipt; it never rewrites the operation.
  stagingReceipt: File!
  project: Directory
  requireProject: Directory!
}

type TypstPackCompilation {
  id: ID!
  status: TypstPackCompilationStatus!
  admissionRefusal: TypstPackAdmissionRefusal
  # Complete corrected org.typst-pack.compilation-operation envelope. It keeps
  # nullable requested jobs distinct from zero, records admitted jobs as an
  # outer adapter fact, and preserves adapter failure, request rejection, and
  # operational admission refusal before any Compilation Report exists.
  operation: File!
  # Exact org.typst-pack.compilation-terminal projection envelope. Null for
  # adapter failure and operational admission refusal; those stay inspectable
  # through operation and do not fabricate a CompilationTerminal branch.
  terminal: File
  # Report metadata wrapper with exact CompilationReportProjection in
  # report_projection. Null unless terminal is the Compilation Report branch.
  report: File
  # Present for ADMISSION_REFUSED after pure preparation and for report branches.
  # Absent only before a Prepared Compilation exists.
  compilationIdentity: String
  resultIdentity: String
  # Final only: NOT_APPLICABLE, SUCCEEDED, or FAILED; reducer intermediates are not wire values.
  stagingStatus: TypstPackStagingStatus!
  stagingReceipt: File!
  artifacts: Directory
  requireSuccess: Directory!
}

enum TypstPackCreationStatus {
  ADAPTER_FAILED
  REQUEST_REJECTED
  ADMISSION_REFUSED
  CREATION_FAILED
  PACK_ISSUED
}

type TypstPackAdmissionRefusal {
  stage: TypstPackAdmissionStage!
}

enum TypstPackAdmissionStage { ADMISSION }

enum TypstPackPackIngressStatus {
  ADAPTER_FAILED
  VALIDATED
  INVALID
  UNSUPPORTED
  EXPECTED_PACK_IDENTITY_MISMATCH
  INPUT_CONTENT_IDENTITY_MISMATCH
  ARCHIVE_ENCODING_ASSERTION_MISMATCH
  RESOURCE_LIMIT
  CANCELLED
  DEADLINE
  ADMISSION_REFUSED
  INTERNAL_INTEGRITY
}

enum TypstPackRepresentationStatus {
  ADAPTER_FAILED
  SUCCEEDED
  ENCODING_FAILED
  SPOOLING_FAILED
  RESOURCE_LIMIT
  CANCELLED
  DEADLINE
  ADMISSION_REFUSED
  INTERNAL_INTEGRITY
}

enum TypstPackCompilationStatus {
  ADAPTER_FAILED
  REQUEST_REJECTED
  ADMISSION_REFUSED
  RESULT_SUCCEEDED
  RESULT_REJECTED
  OPERATION_FAILED
}

enum TypstPackStagingStatus { NOT_APPLICABLE SUCCEEDED FAILED }
enum TypstPackDiscoveryTarget { PAGED HTML }
enum TypstPackEmbeddingPolicy { EMBED_ALL EXTERNALLY_FULFILL_ALL }
enum TypstPackTrustProfile { TRUSTED PARTIALLY_TRUSTED }
enum TypstPackPackFormatEpoch { EPOCH_2 }
enum TypstPackArchiveEncoding { EPOCH_2_ALL_STORED_V1 }
enum TypstPackPdfMetadataMode { AUTOMATIC OMIT CUSTOM }
enum TypstPackPdfTagging { AUTOMATIC ENABLED DISABLED }

enum TypstPackPdfStandard {
  V1_4
  V1_5
  V1_6
  V1_7
  V2_0
